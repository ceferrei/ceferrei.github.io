<html lang="en">
  <head>

    <title>Colored Markers</title>
    <link rel="stylesheet" href="ColoredMarkers.css"> <!-- faz ligacao com o CSS -->
  </head>
  <body>
    <h1>CSS Color Markers</h1>

        <div class="cap"></div>
        <div class="sleeve"></div>
      </div>
      <div class="marker blue">
        <div class="cap"></div>
        <div class="sleeve"></div>
      </div>
    </div>

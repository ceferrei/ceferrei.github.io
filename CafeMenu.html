<!DOCTYPE html>
<html lang="en"> <!--linguagem do site-->
  <head>
    <meta charset="utf-8" /> <!--tell browsers how to encode characters on your page-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- neste caso o content pretende que o estilo da pagina no telemovel seja como num computador
         Outras funcoes que poderia ter o meta sao:
              Fornecer uma descrição da página para os motores de busca
              Fornecer palavras-chave para os motores de busca
              Fornecer o autor da página
              Fornecer informações sobre o conteúdo da página para os mecanismos de compartilhamento social-->
    <title>Cafe Menu</title> <!--gives search engines extra information about the page// tells browsers what text to display in the title bar -->
    <link rel="stylesheet" href="CafeMenu.css" />
    <!--junta o css ao html por link
        O href e' o nome do documento css
        O rel: especificar o tipo de relação que o link possui com o documento atual. "stylesheet" refere a um arquivo de folha de estilo CSS -->
  </head>
  <body>
    <div class="menu"><!-- estamos a fazer a conexao com o css -->
      <main>
        <header>
          <h1>CAMPER CAFE</h1>
          <p class="established">Est. 2020</p> <!-- ja' sabemos que a class serve para estilizar no css -->
        </header>
        <hr>
        <!-- hr HR é a sigla para Horizontal Rule (Linha Horizontal).Serve parainserir uma linha horizontal na página.  -->
        <section>
          <h2>Coffee</h2>
          <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon"/>
          <article class="item">
            <p class="flavor">French Vanilla</p><p class="price">3.00</p>
          </article>
          <article class="item">
            <p class="flavor">Caramel Macchiato</p><p class="price">3.75</p>
          </article>
          <article class="item">
            <p class="flavor">Pumpkin Spice</p><p class="price">3.50</p>
          </article>
          <article class="item">
            <p class="flavor">Hazelnut</p><p class="price">4.00</p>
          </article>
          <article class="item">
            <p class="flavor">Mocha</p><p class="price">4.50</p>
          </article>
          <!-- os article sao parecidos a div, no entanto contem varios elementos com informacao ligada. 
            No caso da div, separa o conteudo da pagina em seccoes logicas 
            Colocamos class para que no css possamos estilizar todos, usando apenas .flavor{}-->
        </section>
        <section>
          <h2>Desserts</h2>
          <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon"/>
          <article class="item">
            <p class="dessert">Donut</p><p class="price">1.50</p>
          </article>
          <article class="item">
            <p class="dessert">Cherry Pie</p><p class="price">2.75</p>
          </article>
          <article class="item">
            <p class="dessert">Cheesecake</p><p class="price">3.00</p>
          </article>
          <article class="item">
            <p class="dessert">Cinnamon Roll</p><p class="price">2.50</p>
          </article>
        </section>
      </main>
      <hr class="bottom-line">
      <footer>
        <p>
          <a href="https://www.freecodecamp.org" target="_blank">Visit our website</a>
        </p>
        <p class="address">123 Free Code Camp Drive</p>
      </footer>
    </div>
  </body>
</html>
